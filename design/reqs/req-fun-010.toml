id="REQ-FUN-010"
title="Sky-scene ephemeris and export"
category="functional"
priority="must"
statement="The engine generates a sky-scene ephemeris: a deterministic time-series of sky scenes sampled at a fixed step across a range, in one of two profiles - 'scribal' (a readable, descriptive record per step) or 'kinematic' (compact per-body altitude/azimuth, illumination, and above-horizon flag, including below-horizon positions for smooth arcs). The step is at least 5 minutes and the range at most 30 days. The series is offered as JSON for optional download, regenerated on demand from its parameters; nothing is persisted server-side. Time is keyed by pulse (scribal additionally carrying Astro day and time-of-day); no civil-calendar or lore terms are baked into the export."
rationale="Describing the sky hour-by-hour for a manuscript, or finely for a future animation, currently needs many hand-built single-moment queries. One meta-query over the existing per-pulse surfaces covers both, and because the result is derived and cheap to recompute, it is regenerated from its parameters rather than stored - giving shareable, reproducible result links with no files to manage."
acceptance=[
  "A request with start, end, and step (>= 5 minutes, range <= 30 days) returns scenes at that cadence; out-of-bounds requests are refused.",
  "Scribal yields a readable per-step record; kinematic yields compact per-body alt/az, illumination, and an above-horizon flag for all tracked bodies, including below-horizon ones.",
  "Per-day context (rise/transit/set, season) appears once per Astro day; per-step state references it.",
  "The series is a pure deterministic function of (start, end, step, profile, config); identical parameters yield byte-identical JSON.",
  "Export is a JSON download regenerated from the request parameters, with no server-side temp file or stored library; no civil/lore terms appear in the export.",
]
[links]
dds=["DD-0009","DD-0002","DD-0003"]