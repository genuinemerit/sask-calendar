id="SPEC-016"
title="Ephemeris web page and regen-on-download export"
status="accepted"

[implements]
requirements=["REQ-FUN-010","REQ-OPS-007","REQ-OPS-008"]
dds=["DD-0009","DD-0003"]

[scope]
in_scope=[
  "A server-rendered page with a form for start time, range length, step, and profile (scribal, kinematic, or both).",
  "Two end-time modes: Pulse mode (explicit start_pulse + end_pulse); Date mode (start via Astro day / Fatunik date / Terpin date + Duration in whole days, end computed as start + duration × 86400 pulses).",
  "Start-time defaults: Astro day and Terpin date resolve to midnight (00:00:00); Fatunik date resolves to 06:00:00 Astro (Fatunik civil day start).",
  "Cross-population of all input formats from the resolved start pulse after each submit, matching the /sky and /moons pattern.",
  "A Reset button to clear all fields before switching input type.",
  "A computed-end display line (Pulse, Astro Day, Fatunik, Terpin) shown in Date mode after Generate.",
  "A truncated JSON preview per requested profile (metadata + first few steps).",
  "A download link per profile carrying the request parameters (start, end, step as raw pulses) in the query string.",
  "A download endpoint that regenerates the JSON from those parameters and streams it as an attachment.",
]
out_of_scope=[
  "JavaScript (DD-0003).",
  "Server-side temp files or a saved-export library.",
  "Lore-rendered preview (technical JSON is shown; lore is a separate overlay).",
]
[deliverables]
page="""
The form has four input-type fieldsets (Pulse / Astro Day / Fatunik Date / Terpin Date)
and a Step & Profile fieldset. Pulse fieldset has an explicit Start and End pulse field.
The other three fieldsets have a Start input only; the end time is computed from a
Duration (Days) integer in the Step & Profile section (end = start + days × 86400).
A Reset button clears all fields. On Generate, resolved values are cross-populated
into all input types (matching /sky). The page URL carries all submitted parameters
so results are shareable. A computed-end summary line is shown in Date mode.
"""
download="""
/ephemeris/download regenerates the series for the given parameters (SPEC-015) and
returns it with Content-Disposition: attachment and a filename encoding range,
step, and profile, e.g. ephemeris_kinematic_p<start>-<end>_s<step>.json. No temp
file is written; the browser owns the save location. 'Both' is two links (a single
zip is an optional alternative).
"""
[acceptance]
checks=[
  "Pulse mode (start_pulse + end_pulse): submitting a valid range shows a preview and download link.",
  "Date mode (start date + duration_days): end is computed; computed-end line shows pulse/Astro/Fatunik/Terpin equivalents.",
  "Duration = 0 or missing with a date-mode start is refused with a clear message.",
  "All start input formats cross-populate after Generate (pulse, Astro day, Fatunik, Terpin all filled).",
  "Reset button clears all fields.",
  "The download returns regenerated JSON as an attachment with a descriptive filename; refreshing the URL reproduces the bytes.",
  "Out-of-bounds step (< 5 min), range (> 30 days), or step ≥ total duration is refused with a clear message.",
  "The page uses no JavaScript; the selected parameters appear in the page URL.",
]