# /config/house_data.toml - the fourteen Houses of the Equinox (DD-0005).

[houses]
name_technical  = "Houses of the Equinox"
name_colloquial = "Houses of Fatune"
tradition       = "Settan"
heresy_note = """
Orthodox Fatunik communities consider both the birth-personality readings and
the colloquial name 'Fatune's Houses' heretical. Non-orthodox Fatunik believers
(notably in the Outer Lands and the Covenant of Varkaar, outside the Fatunik
Dominion) keep the tradition in varied forms; elsewhere in the Saskan Lands,
where Fatunik belief is rare, Fatune holds other roles in local belief.
"""

[placement]
house_count = 12
order_field = "order"
note = """
The twelve seasonal houses are equal arcs of the sidereal year, taken in `order`
1..12, offset late from the season boundaries by about half a house, matching the
authored Late-X-to-Late-Y spans. The implementation computes and freezes the
exact arc boundaries from orbital position; no pulses or calendar dates are set.
The two circumpolar houses have no arc - never 'the sign'.
"""

[[house]]
id="watchers_of_stillness"; name="The Watchers of Stillness"; type="circumpolar"
stars=["ilyrun","kresh"]
shape="Two steady points near the pole with a faint trailing scatter - robed sentinels keeping vigil; Ilyrun the unblinking eye."
lore="Associated with the ancients and the ancestors."

[[house]]
id="chain_of_four"; name="The Chain of Four"; type="circumpolar"
stars=["marnok","sethera"]
shape="Four stars in a short curved chain; Marnok and Sethera the brightest links."
lore="The unknown authors of the Raeyi Muuri, the canonical Fatunik religious text."

[[house]]
id="ember_gate"; name="The Ember Gate"; type="seasonal"; order=1
season_span="late Greening to late Blazing"
personality=["moody","impulsive","leader","physical"]
shape="Two upright pillars bridged by a lintel - a glowing archway."

[[house]]
id="twin_horns"; name="The Twin Horns"; type="seasonal"; order=2
season_span="late Greening to late Blazing"
personality=["patient","reliable","handcrafts","gardening and farming"]
