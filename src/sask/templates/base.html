<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Saskan Calendar{% endblock %}</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 960px;
      margin: 2rem auto;
      padding: 0 1rem;
      color: #222;
    }
    nav { margin-bottom: 1.5rem; font-size: .95rem; }
    nav a { margin-right: 1.2rem; color: #36b; text-decoration: none; }
    nav a:hover { text-decoration: underline; }
    h1 { font-size: 1.4rem; margin-bottom: 1rem; }
    h2 { font-size: 1.1rem; margin: 1.2rem 0 .5rem; }
    fieldset { border: 1px solid #ccc; border-radius: 4px; padding: .5rem 1rem .8rem; margin-bottom: .8rem; }
    legend { font-weight: bold; font-size: .9rem; padding: 0 .3rem; }
    label { display: inline-block; width: 9rem; font-weight: bold; }
    input[type=number], input[type=text] {
      width: 12rem;
      padding: .25rem .4rem;
      font-size: 1rem;
      border: 1px solid #aaa;
      border-radius: 3px;
    }
    button {
      margin-left: .5rem;
      padding: .3rem .9rem;
      font-size: 1rem;
      cursor: pointer;
    }
    table { border-collapse: collapse; margin-top: 1rem; width: 100%; }
    th, td { border: 1px solid #ccc; padding: .35rem .7rem; text-align: left; font-size: .9rem; }
    th { background: #f4f4f4; white-space: nowrap; }
    tr.below { color: #888; }
    .eclipse-solar { background: #fff3cd; }
    .eclipse-lunar { background: #d0e8ff; }
    tr.detail-row td { background: #f6f6f6; font-size: .85rem; border-top: none; color: #444; }
    .error { color: #c00; margin-top: .75rem; }
    .meta { font-size: .85rem; color: #555; margin: .5rem 0 1rem; }
  </style>
</head>
<body>
<nav>
  <a href="/">Pulse</a>
  <a href="/moons">Moons</a>
  <a href="/planets">Planets</a>
  <a href="/sky">Sky</a>
  <a href="/ephemeris">Ephemeris</a>
</nav>
{% block content %}{% endblock %}
</body>
</html>
